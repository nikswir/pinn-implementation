name: CI

on:
  push:
    branches: [main]
    # Skip docs-only pushes; PRs still run the full suite unconditionally.
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "assets/**"
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Verify lockfile is in sync
        run: uv lock --check

      - name: Install dependencies
        run: uv sync

      - name: Lint, format, type-check (pre-commit)
        run: uv run pre-commit run --all-files --show-diff-on-failure

      - name: Test (pytest, CPU)
        run: uv run pytest -q
